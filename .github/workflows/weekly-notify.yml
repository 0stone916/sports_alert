name: Weekly Sports Preview

on:
  schedule:
    - cron: '0 0 * * 0'   # 매주 일요일 오전 9시 KST (= UTC 00:00)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn package -q -DskipTests

      - name: Run weekly alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          ALERT_MODE: weekly
        run: java -jar target/sports-alert-1.0.0.jar
